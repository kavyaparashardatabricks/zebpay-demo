resources:
  pipelines:
    bronze_to_silver:
      name: "ZebPay - Bronze to Silver [${bundle.target}]"
      catalog: ${var.catalog}
      target: ${var.silver_schema}
      channel: CURRENT
      continuous: false
      development: true
      libraries:
        - notebook:
            path: ../src/notebooks/02_silver_transformations.py
      clusters:
        - label: default
          autoscale:
            min_workers: 1
            max_workers: 2
            mode: ENHANCED
