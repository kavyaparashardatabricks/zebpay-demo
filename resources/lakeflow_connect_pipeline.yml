resources:
  pipelines:
    lakeflow_connect_ingestion:
      name: "ZebPay - Lakeflow Connect Ingestion [${bundle.target}]"
      catalog: ${var.catalog}
      target: ${var.bronze_ingestion_schema}
      channel: CURRENT
      continuous: false
      development: true
      libraries:
        - notebook:
            path: ../src/notebooks/04_lakeflow_connect_ingestion.py
      clusters:
        - label: default
          autoscale:
            min_workers: 1
            max_workers: 2
            mode: ENHANCED
